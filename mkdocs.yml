repo_url: https://github.com/Mcitang/User-Documentation
repo_name: Mcitang/User-Documentation
  

theme:
  name: material

  features:
    # Groups pages under headers in the sidebar
    # - navigation.sections

    # Adds a back to top button
    - navigation.top 

    # Integrates floating right table of contents to the headers floating left
    - toc.integrate

    # Allow for us to annotate code like // (1) and // (2)
    - content.code.annotate

    # Adds a copy to clipboard button to the code blocks
    - content.code.copy

  icon:
    repo: fontawesome/brands/github

  font:
    text: Merriweather Sans
    code: Red Hat Mono
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Dark mode

    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Light mode

markdown_extensions:
  # Adds definition tooltips to glossary words (defined at the bottom of markdown file)
  - abbr

  # Allows customizing CSS by using {: #id, .class, style="property: value;" }
  - attr_list

  # Emojis
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

    # Makes the colored boxes for DANGER, INFO, etc with !!!
  - admonition

  # Highlights codeblocks with pretty color, and allows for code blocks in more places, such as the admonition colored boxes
  - pymdownx.superfences

  # Easy dropdowns with ??? or ???+, with icon selected with note, question or info
  - pymdownx.details

  # Wraps keys and shortcuts in UI keycaps. Syntax: ++ctrl+shift+s++
  - pymdownx.keys

  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true

      
